version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: linqs
    ports:
      - "5432:5432"
    volumes:
        - db_data:/var/lib/postgresql/data
        - ./db/init_plain.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - linqs_network

  backend:
    build: ./back
    environment:
      DATABASE_URL: postgres://postgres:1@db:5432/linqs?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - linqs_network

  frontend:
    build: ./linqs-front
    networks:
      - linqs_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - linqs_network

volumes:
  db_data:

networks:
  linqs_network:
    driver: bridge